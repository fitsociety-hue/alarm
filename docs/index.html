<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게시판 알림 설정 대시보드</title>
    <!-- 폰트 적용 (Inter) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <main class="dashboard-container">
        <header class="glass-header">
            <h1>게시판 알림 설정 대시보드</h1>
            <p>이용상담문의 게시판 알림 시간을 직관적으로 관리하세요.</p>
        </header>

        <section class="glass-panel config-section">
            <h2>⚙️ GitHub 연동 설정</h2>
            <p class="desc">알림 주기를 변경하기 위해 저장소 접근 권한이 필요합니다.</p>
            <div class="input-group">
                <label for="github-pat">Personal Access Token (PAT)</label>
                <input type="password" id="github-pat" placeholder="ghp_************************************">
            </div>
            <div class="input-group">
                <label for="github-repo">저장소 (Owner/Repo)</label>
                <input type="text" id="github-repo" value="fitsociety-hue/alarm" placeholder="예: username/repository">
            </div>
            <button id="btn-load" class="btn primary-btn"> 설정 불러오기</button>
        </section>

        <div id="loading-overlay" class="hidden">
            <div class="spinner"></div>
            <p>처리 중...</p>
        </div>

        <section id="schedule-section" class="glass-panel schedule-section hidden">
            <div class="section-header">
                <h2>🕒 현재 알림 스케줄</h2>
                <button id="btn-add-time" class="btn outline-btn">+ 시간 추가</button>
            </div>
            
            <div id="time-list" class="time-list">
                <!-- 동적으로 시간 아이템이 추가됨 -->
            </div>

            <div class="action-buttons">
                <button id="btn-save" class="btn primary-btn full-width">변경 사항 저장 및 적용</button>
            </div>
            <p id="status-message" class="status-msg"></p>
        </section>
    </main>

    <!-- 모달 -->
    <div id="time-modal" class="modal-overlay hidden">
        <div class="glass-modal">
            <h3 id="modal-title">알림 시간 설정</h3>
            <div class="input-group">
                <label for="time-input">시간 선택 (대한민국 KST 기준)</label>
                <input type="time" id="time-input" required>
            </div>
            <div class="modal-actions">
                <button id="btn-modal-cancel" class="btn outline-btn">취소</button>
                <button id="btn-modal-confirm" class="btn primary-btn">확인</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
